
# 开发环境配置


server:
  port: 8080

spring:
  datasource:
    # 开发库（可覆盖主配置）
    url: jdbc:mysql://localhost:3306/pet_adoption?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

logging:
  level:
    com.pet: debug                    # 开发环境输出 debug 日志
    org.springframework: info

# 上传目录（Windows开发路径）
pet:
  upload:
    path: D:/data/pet-adoption/uploads

# ============================================================
# 🎛️ 模拟模式开关（mock: true / false）
#
#   mock: true   → 模拟模式（开发用，不调真实三方服务）
#                   • 滑块验证码：后端直接跳过验证，返回成功
#                   • 短信验证码：控制台输出验证码，不真实发送
#                   • 实名认证：姓名+身份证校验数据库即可，不调人脸API
#
#   mock: false  → 真实模式（生产用，调第三方服务）
#                   删除或注释掉 mock 配置项也等同 false
# ============================================================

  # 滑块验证码
  captcha:
    mock: true       # true=跳过验证 | false=调怜花API

  # 短信验证码
  sms:
    mock: true       # true=控制台输出 | false=调三网短信API

  # 实名认证
  realname:
    mock: true        # true=模拟通过(校验DB) | false=调人脸比对API

mybatis:
  configuration:
    # 开发环境打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl