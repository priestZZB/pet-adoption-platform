# ============================================================
# 宠物领养救助管理平台 — 主配置文件
# ============================================================

server:
  port: 8080

spring:
  profiles:
    active: dev                      # 默认激活 dev 环境
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # ---- 数据源 ----
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pet_adoption?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

    # HikariCP 连接池
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # ---- Redis ----
  redis:
    host: localhost
    port: 6379
    password:                         # 无密码则留空
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 16
        max-wait: -1ms

  # ---- Jackson 日期格式 ----
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # ---- 文件上传 ----
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB


# ---- MyBatis 配置 ----
mybatis:
  # Mapper XML 文件路径（匹配所有子模块）
  mapper-locations: classpath*:com/pet/**/mapper/xml/*.xml
  # 实体类别名包
  type-aliases-package: com.pet.**.model.entity
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 延迟加载
    lazy-loading-enabled: true
    aggressive-lazy-loading: false

# ---- 日志 ----
logging:
  level:
    com.pet: debug
    org.springframework: warn

# ---- 项目自定义配置 ----
pet:
  jwt:
    secret: "PetAdoptionPlatformSecretKey2024!@#$%^&*()"
    expiration: 86400000              # Token 有效期 24 小时（毫秒）
  upload:
    path: /data/pet-adoption/uploads                    # 文件上传存储路径