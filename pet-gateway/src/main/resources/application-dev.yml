# ============================================================
# 开发环境配置
# ============================================================

server:
  port: 8080

spring:
  datasource:
    # 开发库（可覆盖主配置）
    url: jdbc:mysql://localhost:3306/pet_adoption?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

logging:
  level:
    com.pet: debug                    # 开发环境输出 debug 日志
    org.springframework: info

# 上传目录（Windows开发路径）
pet:
  upload:
    path: D:/data/pet-adoption/uploads

# 开发环境开启滑块验证码
  captcha:
    enabled: true

# 开发环境：关闭模拟，走真实短信API
  sms:
    mock: false

# 开发环境：模拟实名认证（不消耗API次数）
  realname:
    mock: true

mybatis:
  configuration:
    # 开发环境打印 SQL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl